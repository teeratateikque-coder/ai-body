<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Body Measurement System</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        .controls {
            margin-bottom: 15px;
        }

        select, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
        }

        .wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            background: black;
        }

        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .results {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .results p {
            margin: 10px 0;
            font-size: 18px;
        }

        .status {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }

        @media(max-width: 768px) {
            .results p {
                font-size: 16px;
            }
            select, button {
                width: 100%;
                max-width: 350px;
            }
        }
    </style>
</head>
<body>

    <h1>AI Body Measurement System</h1>

    <div class="controls">
        <select id="cameraSelect"></select>
        <button onclick="startSelectedCamera()">Start Camera</button>
    </div>

    <div class="wrapper">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="results">
        <p>Height: <span id="height">--</span></p>
        <p>Weight: <span id="weight">--</span></p>
        <p>BMI: <span id="bmi">--</span></p>
        <p>Detection: <span id="personStatus">Waiting...</span></p>
    </div>

    <div class="status" id="status">Loading...</div>

    <script>
        let detector;
        let currentStream;
        let isLoopRunning = false;

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const cameraSelect = document.getElementById("cameraSelect");

        async function loadModels() {
            detector = await poseDetection.createDetector(
                poseDetection.SupportedModels.BlazePose,
                {
                    runtime: 'mediapipe',
                    modelType: 'full',
                    solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose'
                }
            );
            document.getElementById("status").innerText = "AI Model Loaded";
        }

        async function loadCameras() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const cameras = devices.filter(d => d.kind === "videoinput");
            
            cameraSelect.innerHTML = "";
            cameras.forEach((camera, index) => {
                const option = document.createElement("option");
                option.value = camera.deviceId;
                option.text = camera.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });
        }

        async function startSelectedCamera() {
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }

                const deviceId = cameraSelect.value;
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: deviceId ? { exact: deviceId } : {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                currentStream = stream;
                video.srcObject = stream;
                await video.play();

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                if (!isLoopRunning) {
                    isLoopRunning = true;
                    detect();
                }
            } catch (error) {
                alert("Unable to access camera.\n" + error.message);
            }
        }

        // --- แก้ไขลอจิกการคำนวณอย่างเสถียร ---
        function estimateHeight(keypoints) {
            const nose = keypoints[0];
            const leftAnkle = keypoints[27];
            const rightAnkle = keypoints[28];

            if (!nose || !leftAnkle || !rightAnkle) return null;

            const nScore = nose.score !== undefined ? nose.score : 0.5;
            const lScore = leftAnkle.score !== undefined ? leftAnkle.score : 0.5;
            const rScore = rightAnkle.score !== undefined ? rightAnkle.score : 0.5;

            // ดักจับกรณีคนยืนไม่เต็มจอ หรือจุดข้อเท้าถูกบัง
            if (nScore < 0.3 || lScore < 0.3 || rScore < 0.3) return null;

            // ตรวจสอบว่าพิกัดที่ได้เป็นระบบ 0-1 (Normalized) หรือระบบ Pixel จริง
            // เพื่อทำการ Map เข้าสู่ระยะความละเอียดความกว้างยาวของกล้องปัจจุบัน
            let noseY = nose.y;
            let leftAnkleY = leftAnkle.y;
            let rightAnkleY = rightAnkle.y;

            if (noseY <= 1 && leftAnkleY <= 1) {
                noseY *= video.videoHeight;
                leftAnkleY *= video.videoHeight;
                rightAnkleY *= video.videoHeight;
            }

            const ankleY = (leftAnkleY + rightAnkleY) / 2;
            const pixelHeight = ankleY - noseY;

            if (pixelHeight <= 10) return null; // ระยะพิกเซลน้อยเกินไป

            /* ปรับปรุงอัตราส่วนพิกเซลต่อเซนติเมตร (Pixel-to-CM Ratio)
               สูตรนี้คิดคำนวณบนพื้นฐานที่คนยืนห่างจากกล้องเว็บแคมระยะประมาณ 2-2.5 เมตร
               หากสัดส่วนสูงเกินไปหรือเตี้ยเกินไป สามารถปรับแต่งตัวคูณ 0.39 ได้ตามความเหมาะสมครับ
            */
            const estimatedHeight = pixelHeight * 0.39; 
            return Math.round(estimatedHeight);
        }

        function estimateWeight(height) {
            if (!height || height < 100) return 0;
            const targetBmi = 22.0; // ดัชนีมวลกายมาตรฐานระดับสุขภาพดี
            const meters = height / 100;
            return Math.round(targetBmi * (meters * meters));
        }

        function drawPoint(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "red";
            ctx.fill();
        }

        function drawLine(a, b) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "lime";
            ctx.stroke();
        }

        function drawSkeleton(pose) {
            const points = pose.keypoints;

            points.forEach(point => {
                const score = point.score !== undefined ? point.score : 0.5;
                if (score > 0.3) {
                    drawPoint(point.x, point.y);
                }
            });

            const pairs = [
                [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
                [11, 23], [12, 24], [23, 24], [23, 25], [25, 27],
                [24, 26], [26, 28]
            ];

            pairs.forEach(pair => {
                const a = points[pair[0]];
                const b = points[pair[1]];
                if (a && b) {
                    const aScore = a.score !== undefined ? a.score : 0.5;
                    const bScore = b.score !== undefined ? b.score : 0.5;
                    if (aScore > 0.3 && bScore > 0.3) {
                        drawLine(a, b);
                    }
                }
            });
        }

        async function detect() {
            if (!detector || video.readyState < 2) {
                requestAnimationFrame(detect);
                return;
            }

            try {
                const poses = await detector.estimatePoses(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (poses && poses.length > 0) {
                    const pose = poses[0];
                    drawSkeleton(pose);

                    document.getElementById("personStatus").innerText = "Person Detected";
                    
                    const height = estimateHeight(pose.keypoints);

                    // แก้ไขลอจิกเงื่อนไขการตรวจสอบและการเรียกใช้ตัวแปรเพื่อคำนวณหาค่า BMI
                    if (height && height >= 100 && height <= 250) {
                        const weight = estimateWeight(height);
                        const meters = height / 100;
                        const bmiValue = (weight / (meters * meters)).toFixed(1);

                        document.getElementById("height").innerText = height + " cm";
                        document.getElementById("weight").innerText = weight + " kg";
                        document.getElementById("bmi").innerText = bmiValue;
                    } else {
                        // ดักกรณีคำนวณความสูงหลุดช่วงมาตรฐาน
                        document.getElementById("height").innerText = "--";
                        document.getElementById("weight").innerText = "--";
                        document.getElementById("bmi").innerText = "--";
                    }
                } else {
                    document.getElementById("personStatus").innerText = "No Person Detected";
                    document.getElementById("height").innerText = "--";
                    document.getElementById("weight").innerText = "--";
                    document.getElementById("bmi").innerText = "--";
                }
            } catch (err) {
                console.error("Detection error:", err);
            }

            requestAnimationFrame(detect);
        }

        async function init() {
            try {
                await loadModels();
                await loadCameras();
                await startSelectedCamera();
            } catch (error) {
                document.getElementById("status").innerText = "Error initialization system";
            }
        }

        init();
    </script>
</body>
</html>
